name: Deploy Production

on:
  push:
    branches: ["production"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        required: false
        default: "production"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --include=optional

      - name: Run tests
        run: npm test

      - name: Verify public assets
        run: npm run verify:assets

      - name: Typecheck
        run: npm run lint

      - name: Build site
        run: npm run build

      - name: Deploy to nivi
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          timeout: 90s
          command_timeout: 15m
          script: |
            set -euo pipefail
            TARGET_DIR="$HOME/apps/serefy-innovations-preview"

            if [ ! -d "$TARGET_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$TARGET_DIR"
            fi

            cd "$TARGET_DIR"
            git fetch origin --prune
            git checkout production
            git reset --hard "origin/production"
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps
            docker exec serefy-innovations-preview wget -q -O - http://127.0.0.1/healthz
