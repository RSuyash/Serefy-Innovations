name: PR Validate

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --include=optional

      - name: Run tests
        run: npm test

      - name: Verify public assets
        run: npm run verify:assets

      - name: Typecheck
        run: npm run lint

      - name: Build site
        run: npm run build
